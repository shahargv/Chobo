name: chobo-demo

services:
  minio:
    attach: false
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: chobo-access-key
      MINIO_ROOT_PASSWORD: chobo-secret-key
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - chobo-demo-minio-data:/data
    networks:
      - chobo-demo

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set chobo http://minio:9000 chobo-access-key chobo-secret-key; do sleep 2; done
        mc mb --ignore-existing chobo/data-bucket
        mkdir -p /demo-output
        touch /demo-output/minio-init.done
    volumes:
      - ../../.artifacts/demo:/demo-output
    networks:
      - chobo-demo

  clickhouse-keeper:
    attach: false
    image: clickhouse/clickhouse-server:26.3
    command: ["clickhouse-keeper", "--config-file=/etc/clickhouse-keeper/keeper_config.xml"]
    ports:
      - "19181:9181"
      - "19234:9234"
    volumes:
      - ./clickhouse-keeper/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - chobo-demo-keeper-data:/var/lib/clickhouse
    networks:
      - chobo-demo

  clickhouse-s1-r1:
    attach: false
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    depends_on:
      - clickhouse-keeper
    ports:
      - "18111:8123"
      - "8153:8123"
      - "19111:9000"
    volumes:
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros-s1-r1.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chobo-demo-clickhouse-s1-r1-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - chobo-demo

  clickhouse-s1-r2:
    attach: false
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    depends_on:
      - clickhouse-keeper
    ports:
      - "18112:8123"
      - "19112:9000"
    volumes:
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros-s1-r2.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chobo-demo-clickhouse-s1-r2-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - chobo-demo

  clickhouse-s2-r1:
    attach: false
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    depends_on:
      - clickhouse-keeper
    ports:
      - "18121:8123"
      - "19121:9000"
    volumes:
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros-s2-r1.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chobo-demo-clickhouse-s2-r1-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - chobo-demo

  clickhouse-s2-r2:
    attach: false
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    depends_on:
      - clickhouse-keeper
    ports:
      - "18122:8123"
      - "19122:9000"
    volumes:
      - ./clickhouse-cluster/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-cluster/macros-s2-r2.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chobo-demo-clickhouse-s2-r2-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - chobo-demo

  clickhouse-init:
    image: clickhouse/clickhouse-server:26.3
    user: root
    entrypoint: ["/bin/bash", "/scripts/demo-clickhouse-init.sh"]
    environment:
      CHOBO_DEMO_BIG_TABLE_TARGET_MB: ${CHOBO_DEMO_BIG_TABLE_TARGET_MB:-100}
      CHOBO_DEMO_OUTPUT_DIR: /demo-output
    volumes:
      - ./scripts/demo-clickhouse-init.sh:/scripts/demo-clickhouse-init.sh:ro
      - ../../.artifacts/demo:/demo-output
    depends_on:
      - clickhouse-s1-r1
      - clickhouse-s1-r2
      - clickhouse-s2-r1
      - clickhouse-s2-r2
    networks:
      - chobo-demo

  choboserver:
    attach: false
    user: root
    image: shahargv/chobo:server-latest
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      CHOBO_INIT_ADMIN_USER: admin
      CHOBO_INIT_ACCESS_TOKEN: demo-static-access-token
      CHOBO_DATA_DIRECTORY: /tmp/chobo-data
      Chobo__BackupRestore__SchedulerInterval: "00:00:05"
      Chobo__BackupRestore__PollInterval: "00:00:02"
      Chobo__BackupStorageOperations__S3RequestTimeout: "00:10:00"
    depends_on:
      - minio
      - clickhouse-s1-r1
      - clickhouse-s1-r2
      - clickhouse-s2-r1
      - clickhouse-s2-r2
    ports:
      - "18080:8080"
    volumes:
      - chobo-demo-server-data:/tmp/chobo-data
    networks:
      - chobo-demo

  demo-init:
    image: shahargv/chobo:cli-latest
    entrypoint: ["/bin/sh", "/scripts/demo-chobo-configure.sh"]
    environment:
      CHOBO_INTERNAL_URL: http://choboserver:8080
      CHOBO_ACCESS_TOKEN: demo-static-access-token
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: chobo-access-key
      MINIO_SECRET_KEY: chobo-secret-key
      MINIO_BUCKET: data-bucket
      CHOBO_DEMO_OUTPUT_DIR: /demo-output
    volumes:
      - ./scripts/demo-chobo-configure.sh:/scripts/demo-chobo-configure.sh:ro
      - ../../.artifacts/demo:/demo-output
    depends_on:
      - minio-init
      - clickhouse-init
      - choboserver
    networks:
      - chobo-demo


  chobocli:
    attach: false
    image: shahargv/chobo:cli-latest
    container_name: chobo-demo-cli
    entrypoint: ["/bin/sh", "-c", "while [ ! -f /demo-output/demo-env.json ]; do sleep 2; done; sleep infinity"]
    volumes:
      - ../../.artifacts/demo:/demo-output:ro
    depends_on:
      - demo-init
    networks:
      - chobo-demo
networks:
  chobo-demo:
    driver: bridge

volumes:
  chobo-demo-minio-data:
  chobo-demo-keeper-data:
  chobo-demo-clickhouse-s1-r1-data:
  chobo-demo-clickhouse-s1-r2-data:
  chobo-demo-clickhouse-s2-r1-data:
  chobo-demo-clickhouse-s2-r2-data:
  chobo-demo-server-data: