name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 1.2.3
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOCKER_IMAGE: shahargv/chobo
  FULL_SYSTEM_TEST_GLOBAL_TIMEOUT_SECONDS: 1200
  SYSTEM_TEST_TIMEOUT_SECONDS: 120

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      informational_version: ${{ steps.version.outputs.informational_version }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA::12}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "informational_version=$version+$short_sha" >> "$GITHUB_OUTPUT"

  validate:
    name: Build and test release
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 260

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Chobo.sln

      - name: Build
        run: dotnet build Chobo.sln -c Release --no-restore /p:Version=${{ needs.prepare.outputs.version }} /p:InformationalVersion=${{ needs.prepare.outputs.informational_version }}

      - name: Unit tests
        run: dotnet test Chobo.Tests/Chobo.Tests.csproj -c Release --no-build -v minimal --blame-hang --blame-hang-timeout 30s

      - name: Full system tests
        shell: pwsh
        run: ./TestingSuite/TestManager.ps1 -TestId "gha-release-${{ github.run_id }}" -GlobalTimeoutSeconds $env:FULL_SYSTEM_TEST_GLOBAL_TIMEOUT_SECONDS -TestTimeoutSeconds $env:SYSTEM_TEST_TIMEOUT_SECONDS

      - name: Upload system test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-system-test-results
          path: .artifacts/TestResults
          if-no-files-found: ignore
          retention-days: 30

  publish:
    name: Publish release
    needs: [prepare, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ChoboWeb/package-lock.json

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/Build-Artifacts.ps1 -Configuration Release -Version '${{ needs.prepare.outputs.version }}'

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, save, and push Docker images
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          INFORMATIONAL_VERSION: ${{ needs.prepare.outputs.informational_version }}
        run: |
          set -euo pipefail

          output_dir=".artifacts/build/Release"
          mkdir -p "$output_dir"

          server_version_tag="${DOCKER_IMAGE}:server-v${RELEASE_VERSION}"
          server_latest_tag="${DOCKER_IMAGE}:server-latest"
          cli_version_tag="${DOCKER_IMAGE}:cli-v${RELEASE_VERSION}"
          cli_latest_tag="${DOCKER_IMAGE}:cli-latest"

          docker build \
            --file ChoboServer/Dockerfile \
            --build-arg "BUILD_VERSION=${RELEASE_VERSION}" \
            --build-arg "INFORMATIONAL_VERSION=${INFORMATIONAL_VERSION}" \
            --tag "$server_version_tag" \
            --tag "$server_latest_tag" \
            .
          docker save --output "$output_dir/chobo-server-docker-v${RELEASE_VERSION}.tar" "$server_version_tag"
          docker push "$server_version_tag"
          docker push "$server_latest_tag"

          docker build \
            --file ChoboCli/Dockerfile \
            --build-arg "BUILD_VERSION=${RELEASE_VERSION}" \
            --build-arg "INFORMATIONAL_VERSION=${INFORMATIONAL_VERSION}" \
            --tag "$cli_version_tag" \
            --tag "$cli_latest_tag" \
            .
          docker save --output "$output_dir/chobo-cli-docker-v${RELEASE_VERSION}.tar" "$cli_version_tag"
          docker push "$cli_version_tag"
          docker push "$cli_latest_tag"

      - name: Update release checksums
        shell: bash
        run: |
          set -euo pipefail

          output_dir=".artifacts/build/Release"
          checksum_file="$output_dir/SHA256SUMS.txt"
          : > "$checksum_file"

          for file in "$output_dir"/*.zip "$output_dir"/*.tar; do
            hash="$(sha256sum "$file" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$(basename "$file")" >> "$checksum_file"
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: chobo-release-${{ needs.prepare.outputs.version }}
          path: |
            .artifacts/build/Release/*.zip
            .artifacts/build/Release/*.tar
            .artifacts/build/Release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Chobo $RELEASE_VERSION

          Docker images:
          - [server-v$RELEASE_VERSION](https://hub.docker.com/r/shahargv/chobo/tags?name=server-v$RELEASE_VERSION)
          - [cli-v$RELEASE_VERSION](https://hub.docker.com/r/shahargv/chobo/tags?name=cli-v$RELEASE_VERSION)

          Offline Docker image tar files are attached to this release.
          EOF

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Chobo $RELEASE_VERSION" \
              --notes-file release-notes.md
          else
            gh release edit "$RELEASE_TAG" --notes-file release-notes.md
          fi

          gh release upload "$RELEASE_TAG" .artifacts/build/Release/*.zip .artifacts/build/Release/*.tar .artifacts/build/Release/SHA256SUMS.txt --clobber

