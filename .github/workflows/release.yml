name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 1.2.3
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOCKER_IMAGE: shahargv/chobo
  FULL_SYSTEM_TEST_GLOBAL_TIMEOUT_SECONDS: 1200
  SYSTEM_TEST_TIMEOUT_SECONDS: 120

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      informational_version: ${{ steps.version.outputs.informational_version }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA::12}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "informational_version=$version+$short_sha" >> "$GITHUB_OUTPUT"

  validate:
    name: Build and test release
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 260

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Chobo.sln

      - name: Build
        run: dotnet build Chobo.sln -c Release --no-restore /p:Version=${{ needs.prepare.outputs.version }} /p:InformationalVersion=${{ needs.prepare.outputs.informational_version }}

      - name: Unit tests
        run: dotnet test Chobo.Tests/Chobo.Tests.csproj -c Release --no-build -v minimal --blame-hang --blame-hang-timeout 30s

      - name: Full system tests
        shell: pwsh
        run: ./TestingSuite/TestManager.ps1 -TestId "gha-release-${{ github.run_id }}" -GlobalTimeoutSeconds $env:FULL_SYSTEM_TEST_GLOBAL_TIMEOUT_SECONDS -TestTimeoutSeconds $env:SYSTEM_TEST_TIMEOUT_SECONDS

      - name: Upload system test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-system-test-results
          path: .artifacts/TestResults
          if-no-files-found: ignore
          retention-days: 30

  publish:
    name: Publish release
    needs: [prepare, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/Build-Artifacts.ps1 -Configuration Release -Version '${{ needs.prepare.outputs.version }}'

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v6
        with:
          name: chobo-release-${{ needs.prepare.outputs.version }}
          path: |
            .artifacts/build/Release/*.zip
            .artifacts/build/Release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ChoboServer/Dockerfile
          push: true
          build-args: |
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            INFORMATIONAL_VERSION=${{ needs.prepare.outputs.informational_version }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:server-v${{ needs.prepare.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:server-latest

      - name: Build and push CLI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ChoboCli/Dockerfile
          push: true
          build-args: |
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            INFORMATIONAL_VERSION=${{ needs.prepare.outputs.informational_version }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:cli-v${{ needs.prepare.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:cli-latest

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Chobo $RELEASE_VERSION

          Docker images:
          - [server-v$RELEASE_VERSION](https://hub.docker.com/r/shahargv/chobo/tags?name=server-v$RELEASE_VERSION)
          - [cli-v$RELEASE_VERSION](https://hub.docker.com/r/shahargv/chobo/tags?name=cli-v$RELEASE_VERSION)
          EOF

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Chobo $RELEASE_VERSION" \
              --notes-file release-notes.md
          else
            gh release edit "$RELEASE_TAG" --notes-file release-notes.md
          fi

          gh release upload "$RELEASE_TAG" .artifacts/build/Release/*.zip .artifacts/build/Release/SHA256SUMS.txt --clobber

