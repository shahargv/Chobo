name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-unit-tests:
    name: Build and unit tests
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Chobo.sln

      - name: Build
        run: dotnet build Chobo.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test Chobo.Tests/Chobo.Tests.csproj -c Release --no-build -v minimal --blame-hang --blame-hang-timeout 30s

  smoke-system-tests:
    name: Smoke system tests
    needs: build-and-unit-tests
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ci') && !contains(github.event.pull_request.labels.*.name, 'skip-system-tests') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run smoke system tests
        shell: pwsh
        run: ./TestingSuite/TestManager.ps1 -TestId "gha-pr-${{ github.run_id }}" -TestName SmokeCreateTables,ChoboCrudSmoke -GlobalTimeoutSeconds 1800 -TestTimeoutSeconds 300

      - name: Upload system test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pr-system-test-results
          path: .artifacts/TestResults
          if-no-files-found: ignore
          retention-days: 14
